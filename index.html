<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConectaVida</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

    <header class="header">
        <div class="topo">
            <input type="text" placeholder="Pesquisar..." class="barra-pesquisa">
            <div class="logo-topo">🐵</div>
        </div>

        <div class="divheader">
            <nav class="nav">
                <a href="#" class="nav-item">🏠<span>Início</span></a>
                <a href="#" class="nav-item">💬<span>Mensagens</span></a>
                <a href="#" class="nav-item">👤<span>Perfil</span></a>
            </nav>
        </div>
    </header>

    <main class="conteudo-principal">


        <div class="carrossel-container">
            <div class="carrossel-track">
                <div class="slide-item">Geral</div>
                <div class="slide-item">Política</div>
                <div class="slide-item">Religião</div>
                <div class="slide-item">Memes</div>
                <div class="slide-item">Tecnologia</div>
                <div class="slide-item">Esportes</div>

                <div class="slide-item">Geral</div>
                <div class="slide-item">Política</div>
                <div class="slide-item">Religião</div>
                <div class="slide-item">Memes</div>
                <div class="slide-item">Tecnologia</div>
                <div class="slide-item">Esportes</div>

                <div class="slide-item">Geral</div>
                <div class="slide-item">Política</div>
                <div class="slide-item">Religião</div>
                <div class="slide-item">Memes</div>
                <div class="slide-item">Tecnologia</div>
                <div class="slide-item">Esportes</div>
            </div>
        </div>

        <section id="tela-inicio" class="tela ativa">
            <h2>Feed</h2>
            <p>Bem-vindo ao ConectaVida 👋</p>
        </section>

        <section id="tela-mensagens" class="tela">
            <h2>Mensagens</h2>
            <p>Suas conversas aparecerão aqui 💬</p>
        </section>

        <section id="tela-perfil" class="tela">
            <h2>Perfil</h2>
            <p>Seus dados 👤</p>
        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>
